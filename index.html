<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Схемы строповки ONLINE</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body { font-family: Arial; text-align:center; background:#f4f6f8; }
.card { width:200px; margin:10px; background:white; padding:10px; border-radius:10px; display:inline-block; }
img { width:100%; cursor:pointer; }
</style>
</head>

<body>

<h1>🌐  Схемы строповки ONLINE</h1>

<input type="file" id="file">
<input type="text" id="title" placeholder="Название">
<select id="category">
  <option>Трубы</option>
  <option>Плиты</option>
  <option>Оборудование</option>
</select>
<button onclick="save()">Добавить</button>

<div id="gallery"></div>

<script type="module">

// 
firebaseConfig = {
  apiKey: "AIzaSyBl1ZcU9VK2ozfs6Ri1vGpGMClfu_7GpK4",
  authDomain: "stropping-app-asia-drilling.firebaseapp.com",
  databaseURL: "https://stropping-app-asia-drilling-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "stropping-app-asia-drilling",
  storageBucket: "stropping-app-asia-drilling.firebasestorage.app",
  messagingSenderId: "173983712973",
  appId: "1:173983712973:web:4950cfd1570bbfd9680b84",
  measurementId: "G-P50F9E3QWC"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function save() {
  const file = document.getElementById("file").files[0];
  const reader = new FileReader();

  reader.onload = async function(e) {
    await addDoc(collection(db, "schemes"), {
      img: e.target.result,
      title: document.getElementById("title").value,
      category: document.getElementById("category").value
    });
    load();
  };

  reader.readAsDataURL(file);
}

async function load() {
  const querySnapshot = await getDocs(collection(db, "schemes"));

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  querySnapshot.forEach(doc => {
    const data = doc.data();

    gallery.innerHTML += `
      <div class="card">
        <img src="${data.img}">
        <div>${data.title}</div>
        <div>${data.category}</div>
      </div>
    `;
  });
}

load();

</script>

</body>
</html>
