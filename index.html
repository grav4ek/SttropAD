<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Схемы строповки ONLINE</title>

<style>
body { font-family: Arial; text-align:center; background:#f4f6f8; }

.controls { margin: 10px; }

input, select {
  padding: 8px;
  margin: 5px;
}

button {
  padding: 10px;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

#gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  width: 200px;
  margin: 10px;
  background: white;
  border-radius: 10px;
  padding: 10px;
}

img {
  width: 100%;
  border-radius: 8px;
  cursor: pointer;
}

.title { font-weight: bold; }
.category { font-size: 12px; color: gray; }
</style>
</head>

<body>

<h1>🌐  Схемы строповки ONLINE</h1>

<div class="controls">
  <input type="file" id="file">
  <input type="text" id="title" placeholder="Название">
  
  <select id="category">
    <option>Трубы</option>
    <option>Плиты</option>
    <option>Оборудование</option>
    <option>Другое</option>
  </select>

  <button onclick="save()">Добавить</button>
</div>

<div id="gallery"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// ✅ ТВОЙ CONFIG (исправленный)
const firebaseConfig = {
  apiKey: "AIzaSyBl1ZcU9VK2ozfs6Ri1vGpGMClfu_7GpK4",
  authDomain: "stropping-app-asia-drilling.firebaseapp.com",
  databaseURL: "https://stropping-app-asia-drilling-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "stropping-app-asia-drilling",
  storageBucket: "stropping-app-asia-drilling.firebasestorage.app",
  messagingSenderId: "173983712973",
  appId: "1:173983712973:web:4950cfd1570bbfd9680b84",
  measurementId: "G-P50F9E3QWC"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getFirestore(app);

// ➕ добавить схему
window.save = async function() {
  const file = document.getElementById("file").files[0];
  const title = document.getElementById("title").value;
  const category = document.getElementById("category").value;

  if (!file || !title) {
    alert("Добавь файл и название");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(e) {
    await addDoc(collection(db, "schemes"), {
      img: e.target.result,
      title,
      category
    });

    load();
  };

  reader.readAsDataURL(file);
};

// 📥 загрузка всех схем
async function load() {
  const querySnapshot = await getDocs(collection(db, "schemes"));

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  querySnapshot.forEach(doc => {
    const data = doc.data();

    gallery.innerHTML += `
      <div class="card">
        <img src="${data.img}">
        <div class="title">${data.title}</div>
        <div class="category">${data.category}</div>
      </div>
    `;
  });
}

load();
</script>

</body>
</html>
